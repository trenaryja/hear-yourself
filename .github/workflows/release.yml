name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build DMG
        run: uv run build.py --dmg

      - name: Write release body
        run: |
          echo "See [CHANGELOG.md](https://github.com/trenaryja/hear-yourself/blob/${{ github.ref_name }}/CHANGELOG.md) for release notes." > release_notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/Hear Yourself.dmg"
          body_path: release_notes.md
